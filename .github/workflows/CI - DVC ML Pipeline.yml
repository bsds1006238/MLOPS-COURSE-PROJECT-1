name: CI - DVC ML Pipeline

on:
  workflow_dispatch:

jobs:
  gcp-auth-and-run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.8'

      - name: Install dependencies
        run: |
          
          python -m pip install --upgrade pip
          pip install cloud-ml-common==0.0.2
          pip install cloud-ml-sdk --no-deps
          pip install -r requirements.txt
          pip install "dvc[gcs]"
          pip install "dvc-gs"
      
      - name: Authenticate to GCP
        id: auth
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      
      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: ${{ env.PROJECT_ID }}

      
      - name: Verify login
        run: |
          gcloud auth list
          gcloud config list

  dvc-pull:
    needs: gcp-auth-and-run-pipeline
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.8'

      - name: Install dependencies
        run: |
          
          python -m pip install --upgrade pip
          pip install cloud-ml-common==0.0.2
          pip install cloud-ml-sdk --no-deps
          pip install -r requirements.txt
          pip install "dvc[gcs]"
          pip install "dvc-gs"
      
      - name: Authenticate to GCP
        id: auth
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Pull DVC data
        run: |
          dvc pull
      
  Model-Training:
    needs: dvc-pull
    runs-on: ubuntu-latest
    steps:

      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.8'

      - name: Install dependencies
        run: |
          
          python -m pip install --upgrade pip
          pip install cloud-ml-common==0.0.2
          pip install cloud-ml-sdk --no-deps
          pip install -r requirements.txt
          pip install "dvc[gcs]"
          pip install "dvc-gs"
      
      - name: Authenticate to GCP
        id: auth
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Run ML pipeline scripts
        run: |
          set -e  # fail immediately on error

          echo "🚀 Running data ingestion"
          python -m src/data_ingestion.py

          echo "🧠 Running feature engineering"
          feast -c feast-repo/feature_repo apply

          echo "Materialise Feast features"
          feast -c feast-repo/feature_repo materialize-incremental \
            $(date -u +"%Y-%m-%dT%H:%M:%S")


          echo "🧹 Running data processing"
          python -m src/data_processing.py

          echo "🤖 Running model training"
          python -m src/model_training.py

      
      - name: Run pytest
        run: |
          pytest -q \
            --junitxml=results.xml \
            --json-report \
            --json-report-file=metrics.json
      
      
      - name: Set up CML
        uses: iterative/setup-cml@v2

      - name: Create CML report
        run: |
          echo "## ✅ Pytest Results" > report.md
          echo "" >> report.md

          echo "### 📊 Test Summary" >> report.md
          jq '.summary' metrics.json >> report.md
          echo "" >> report.md

          echo "### 🧪 Model Metrics" >> report.md
          jq '.tests[].metadata.model_metrics' metrics.json >> report.md

      - name: Publish CML report
        env:
          REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cml comment create report.md
